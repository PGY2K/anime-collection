<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Collection • My Anime Tracker</title>
  <meta name="theme-color" content="#8b5cf6" />
  <meta name="application-name" content="My Anime Tracker" />
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="icon" type="image/png" sizes="32x32" href="assets/icons/favicon-32.png" />
  <link rel="apple-touch-icon" href="assets/icons/apple-touch-icon.png" />
  <link rel="stylesheet" href="css/style.css?v=5.8.6" />
  <link rel="stylesheet" href="css/profile.css" />
  <link rel="stylesheet" href="css/add-anime.css?v=5.6.0" />
</head>
<body>
  <main class="shell">
    <nav class="navbar">
      <a class="brand brand-link" href="index.html" aria-label="My Anime Tracker dashboard"><img class="brand-logo" src="assets/icons/mat-logo.png" alt="" /><span>MAT</span></a>

      <div class="nav-links">
        <a href="index.html">Dashboard</a>
        <a class="active" href="collection.html">Collection</a>
        <a href="ratings.html">Ratings</a>
        <a href="friends.html">Following</a>
        <button class="nav-rp-button" type="button" aria-label="Recommendation Points. Open earning guide."><img src="assets/icons/rp-gem.png" alt="RP"><strong data-rp-total>0</strong><span>RP</span></button>
        <a class="profile-nav-link" href="profile.html" aria-label="Open profile" title="Profile">
          <img id="navProfileAvatar" src="assets/avatars/avatar-1.svg" alt="Profile" />
        </a>
      </div>
    </nav>

    <section class="page-header collection-heading">
      <div>
        <h1 class="page-title" id="collectionPageTitle">Your <span>Collection</span></h1>
        <p class="page-subtitle" id="collectionPageSubtitle">Track everything you're watching, waiting on, completed, queued, or dropped.</p>
      </div>

      <button class="primary-btn" id="openAddAnimeBtn" type="button">
        + Add Anime
      </button>
    </section>

    <section class="toolbar">
      <div class="search-row">
        <input
          class="search-box"
          id="searchInput"
          type="search"
          placeholder="Search your collection..."
          autocomplete="off"
        />

        <select class="sort-select" id="sortSelect">
          <option value="title-asc">Title A–Z</option>
          <option value="title-desc">Title Z–A</option>
          <option value="rating-desc">Highest Rated</option>
          <option value="rating-asc">Lowest Rated</option>
        </select>
      </div>

      <div class="filters">
        <button class="filter-btn active" data-filter="all">All</button>
        <button class="filter-btn" data-filter="completed">Completed</button>
        <button class="filter-btn" data-filter="in progress">In Progress</button>
        <button class="filter-btn" data-filter="waiting">Waiting</button>
        <button class="filter-btn" data-filter="dropped">Dropped</button>
        <button class="filter-btn" data-filter="queued">Queued</button>
      </div>
    </section>

    <div class="collection-meta">
      <span id="resultCount">Loading collection…</span>
      <span>Posters and details update automatically.</span>
    </div>

    <section class="anime-grid" id="animeGrid">
      <div class="loading">Loading anime…</div>
    </section>

    <footer class="mat-footer"></footer>
  </main>

  <div class="modal-backdrop hidden" id="addAnimeModal" aria-hidden="true">
    <section class="modal-card" role="dialog" aria-modal="true" aria-labelledby="addAnimeTitle">
      <div class="modal-header">
        <div>
          <h2 id="addAnimeTitle">Add Anime</h2>
          <p>Search and choose the correct show.</p>
        </div>

        <button class="icon-btn" id="closeAddAnimeBtn" type="button" aria-label="Close">
          ×
        </button>
      </div>

      <div class="modal-search-row">
        <input
          class="search-box"
          id="addAnimeSearchInput"
          type="search"
          placeholder="Search anime..."
          autocomplete="off"
        />
      </div>

      <div class="search-results" id="addAnimeResults">
        <div class="empty-state">Search for an anime to begin.</div>
      </div>
    </section>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase-client.js?v=5.7.4"></script>
  <script src="js/profile-nav.js?v=5.8.6"></script>
  <script src="js/content-preferences.js"></script>
  <script src="js/franchises.js"></script>
  <script src="js/pioneer-badge.js"></script>
  <script src="js/app.js?v=5.6.0"></script>
  <script>
    requireSignedInUser().then((user) => {
      if (user) {
        initCollection(user);
      }
    });
  </script>
  <script src="js/version.js?v=5.8.6"></script>
  <script src="js/pwa.js"></script>
</body>
</html>
