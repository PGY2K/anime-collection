<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Collection | Anime Collection</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/profile.css" />
  <link rel="stylesheet" href="css/add-anime.css" />
</head>
<body>
  <main class="shell">
    <nav class="navbar">
      <div class="brand"><span>⛩</span> ANIME COLLECTION</div>

      <div class="nav-links">
        <a href="index.html">Dashboard</a>
        <a class="active" href="collection.html">Collection</a>
        <a href="ratings.html">Ratings</a>
        <a href="friends.html">Friends</a>
        <a class="profile-nav-link" href="profile.html" aria-label="Open profile" title="Profile">
          <img id="navProfileAvatar" src="assets/avatars/avatar-1.svg" alt="Profile" />
        </a>
        <a href="#" id="signOutLink">Sign Out</a>
      </div>
    </nav>

    <section class="page-header collection-heading">
      <div>
        <h1 class="page-title" id="collectionPageTitle">Your <span>Collection</span></h1>
        <p class="page-subtitle" id="collectionPageSubtitle">Search, filter, and browse your anime.</p>
      </div>

      <button class="primary-btn" id="openAddAnimeBtn" type="button">
        + Add Anime
      </button>
    </section>

    <section class="toolbar">
      <div class="search-row">
        <input
          class="search-box"
          id="searchInput"
          type="search"
          placeholder="Search your collection..."
          autocomplete="off"
        />

        <select class="sort-select" id="sortSelect">
          <option value="title-asc">Title A–Z</option>
          <option value="title-desc">Title Z–A</option>
          <option value="rating-desc">Highest Rated</option>
          <option value="rating-asc">Lowest Rated</option>
        </select>
      </div>

      <div class="filters">
        <button class="filter-btn active" data-filter="all">All</button>
        <button class="filter-btn" data-filter="completed">Completed</button>
        <button class="filter-btn" data-filter="in progress">In Progress</button>
        <button class="filter-btn" data-filter="waiting">Waiting</button>
        <button class="filter-btn" data-filter="dropped">Dropped</button>
        <button class="filter-btn" data-filter="queued">Queued</button>
      </div>
    </section>

    <div class="collection-meta">
      <span id="resultCount">Loading collection…</span>
      <span>Posters and details update automatically.</span>
    </div>

    <section class="anime-grid" id="animeGrid">
      <div class="loading">Loading anime…</div>
    </section>

    <footer>Anime Collection</footer>
  </main>

  <div class="modal-backdrop hidden" id="addAnimeModal" aria-hidden="true">
    <section class="modal-card" role="dialog" aria-modal="true" aria-labelledby="addAnimeTitle">
      <div class="modal-header">
        <div>
          <h2 id="addAnimeTitle">Add Anime</h2>
          <p>Search and choose the correct show.</p>
        </div>

        <button class="icon-btn" id="closeAddAnimeBtn" type="button" aria-label="Close">
          ×
        </button>
      </div>

      <div class="modal-search-row">
        <input
          class="search-box"
          id="addAnimeSearchInput"
          type="search"
          placeholder="Search anime..."
          autocomplete="off"
        />

        <button class="primary-btn" id="searchAniListBtn" type="button">
          Search
        </button>
      </div>

      <div class="search-results" id="addAnimeResults">
        <div class="empty-state">Search for an anime to begin.</div>
      </div>
    </section>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase-client.js"></script>
  <script src="js/profile-nav.js"></script>
  <script src="js/app.js"></script>
  <script>
    requireSignedInUser().then((user) => {
      if (user) {
        initCollection();
      }
    });

    document.getElementById("signOutLink").addEventListener("click", (event) => {
      event.preventDefault();
      signOutUser();
    });
  </script>
</body>
</html>
