<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ratings • My Anime Tracker</title>
  <meta name="theme-color" content="#8b5cf6" />
  <meta name="application-name" content="My Anime Tracker" />
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="icon" type="image/png" sizes="32x32" href="assets/icons/favicon-32.png" />
  <link rel="apple-touch-icon" href="assets/icons/apple-touch-icon.png" />
  <link rel="stylesheet" href="css/style.css?v=5.4.6" />
  <link rel="stylesheet" href="css/profile.css" />
  <link rel="stylesheet" href="css/ratings.css" />
</head>
<body>
  <main class="shell">
    <nav class="navbar">
      <a class="brand brand-link" href="index.html" aria-label="My Anime Tracker dashboard"><img class="brand-logo" src="assets/icons/mat-logo.png" alt="" /><span>MAT</span></a>
      <div class="nav-links">
        <a href="index.html">Dashboard</a>
        <a href="collection.html">Collection</a>
        <a class="active" href="ratings.html">Ratings</a>
        <a href="friends.html">Following</a>
        <button class="nav-rp-button" type="button" aria-label="Recommendation Points. Open earning guide."><img src="assets/icons/rp-gem.png" alt="RP"><strong data-rp-total>0</strong><span>RP</span></button>
        <a class="profile-nav-link" href="profile.html" aria-label="Open profile" title="Profile">
          <img id="navProfileAvatar" src="assets/avatars/avatar-1.svg" alt="Profile" />
        </a>
      </div>
    </nav>

    <section class="page-header ratings-heading">
      <div>
        <h1 class="page-title">Your <span>Ratings</span></h1>
        <p class="page-subtitle">Review what you rated and what still needs a rating.</p>
      </div>
    </section>

    <section class="ratings-toolbar">
      <div class="ratings-tabs" role="tablist">
        <button class="ratings-tab active" data-tab="rated" type="button">Rated</button>
        <button class="ratings-tab" data-tab="unrated" type="button">Unrated</button>
      </div>

      <div class="ratings-controls" id="ratedControls">
        <input class="search-box" id="ratingsSearch" type="search" placeholder="Search rated anime..." autocomplete="off" />
        <select class="sort-select" id="ratingsSort">
          <option value="highest">Highest Rated</option>
          <option value="lowest">Lowest Rated</option>
          <option value="az">Title A–Z</option>
          <option value="za">Title Z–A</option>
        </select>
        <label class="favorite-filter">
          <input id="favoritesOnly" type="checkbox" />
          Favorites only
        </label>
      </div>
    </section>

    <div class="ratings-meta" id="ratingsMeta">Loading ratings…</div>
    <section class="ratings-list" id="ratingsList">
      <div class="loading">Loading ratings…</div>
    </section>
    <footer class="mat-footer"></footer>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase-client.js"></script>
  <script src="js/profile-nav.js?v=5.2.0"></script>
  <script src="js/content-preferences.js"></script>
  <script src="js/franchises.js"></script>
  <script src="js/ratings.js"></script>
  <script>
    requireSignedInUser().then((user) => { if (user) initRatings(); });
  </script>
  <script src="js/version.js?v=5.4.6"></script>
  <script src="js/pwa.js"></script>
</body>
</html>
