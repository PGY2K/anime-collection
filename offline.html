<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#8b5cf6" />
  <title>Offline • My Anime Tracker</title>
  <link rel="icon" type="image/png" href="assets/icons/favicon-32.png" />
  <link rel="stylesheet" href="css/style.css" />
  <style>
    .offline-page{min-height:100vh;display:grid;place-items:center;padding:24px}.offline-card{width:min(480px,100%);text-align:center;padding:38px;border:1px solid var(--border);border-radius:24px;background:linear-gradient(145deg,var(--panel-2),var(--panel));box-shadow:0 24px 80px rgba(0,0,0,.45)}.offline-logo{width:96px;height:96px;border-radius:24px;box-shadow:0 0 35px rgba(190,110,255,.55)}.offline-card h1{margin:24px 0 10px}.offline-card p{color:var(--muted);line-height:1.6}.offline-card button{margin-top:16px}
  </style>
</head>
<body>
  <main class="offline-page">
    <section class="offline-card">
      <img class="offline-logo" src="assets/icons/mat-logo.png" alt="My Anime Tracker" />
      <h1>No internet connection</h1>
      <p>My Anime Tracker requires an internet connection to access your collection, friends, trailers, and account data.</p>
      <button class="primary-btn" type="button" onclick="location.reload()">Try Again</button>
    </section>
    <footer class="mat-footer"></footer>
  </main>
  <script src="js/version.js?v=4.4.0"></script>
</body>
</html>
