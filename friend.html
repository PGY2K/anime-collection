<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Friend Profile • My Anime Tracker</title>
  <meta name="theme-color" content="#8b5cf6" />
  <meta name="application-name" content="My Anime Tracker" />
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="icon" type="image/png" sizes="32x32" href="assets/icons/favicon-32.png" />
  <link rel="apple-touch-icon" href="assets/icons/apple-touch-icon.png" />
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/profile.css" />
  <link rel="stylesheet" href="css/friends.css" />
</head>
<body>
  <main class="shell">
    <nav class="navbar">
      <a class="brand brand-link" href="index.html" aria-label="My Anime Tracker dashboard"><img class="brand-logo" src="assets/icons/mat-logo.png" alt="" /><span>MAT</span></a>
      <div class="nav-links">
        <a href="index.html">Dashboard</a>
        <a href="collection.html">Collection</a>
        <a href="ratings.html">Ratings</a>
        <a class="active" href="friends.html">Friends</a>
        <a class="profile-nav-link" href="profile.html" aria-label="Open profile" title="Profile">
          <img id="navProfileAvatar" src="assets/avatars/avatar-1.svg" alt="Profile" />
        </a>
        <a href="#" id="signOutLink">Sign Out</a>
      </div>
    </nav>

    <section id="friendProfileRoot">
      <div class="loading">Loading friend profile…</div>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase-client.js"></script>
  <script src="js/profile-nav.js"></script>
  <script src="js/friend-profile.js"></script>
  <script>
    requireSignedInUser().then((user) => {
      if (user) initFriendProfile();
    });

    document.getElementById("signOutLink").addEventListener("click", (event) => {
      event.preventDefault();
      signOutUser();
    });
  </script>
  <script src="js/pwa.js"></script>
</body>
</html>
