<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Anime Details | Anime Collection</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/anime.css" />
</head>
<body>
  <main class="shell">
    <nav class="navbar">
      <div class="brand"><span>⛩</span> ANIME COLLECTION</div>
      <div class="nav-links">
        <a href="index.html">Dashboard</a>
        <a href="collection.html">Collection</a>
        <a href="#">Ratings</a>
        <a href="#" id="signOutLink">Sign Out</a>
      </div>
    </nav>

    <div id="detailsRoot" class="details-root">
      <div class="loading">Loading anime details…</div>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase-client.js"></script>
  <script src="js/anime-details.js"></script>
  <script>
    requireSignedInUser().then((user) => {
      if (user) initAnimeDetails();
    });

    document.getElementById("signOutLink").addEventListener("click", (event) => {
      event.preventDefault();
      signOutUser();
    });
  </script>
</body>
</html>
