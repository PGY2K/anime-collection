<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Profile • My Anime Tracker</title>
  <meta name="theme-color" content="#8b5cf6" />
  <meta name="application-name" content="My Anime Tracker" />
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="icon" type="image/png" sizes="32x32" href="assets/icons/favicon-32.png" />
  <link rel="apple-touch-icon" href="assets/icons/apple-touch-icon.png" />
  <link rel="stylesheet" href="css/style.css?v=6.1.3" />
  <link rel="stylesheet" href="css/profile.css?v=6.1.3" />
</head>
<body>
  <main class="shell">
    <nav class="navbar">
      <a class="brand brand-link" href="index.html" aria-label="My Anime Tracker dashboard"><img class="brand-logo" src="assets/icons/mat-logo.png" alt="" /><span>MAT</span></a>
      <div class="nav-links">
        <a href="index.html">Dashboard</a>
        <a href="collection.html">Collection</a>
        <a href="ratings.html">Ratings</a>
        <a href="friends.html">Following</a>
        <button class="nav-rp-button" type="button" aria-label="Recommendation Points. Open earning guide."><img src="assets/icons/rp-gem.png" alt="RP"><strong data-rp-total>0</strong><span>RP</span></button>
        <a class="profile-nav-link active" href="profile.html" aria-label="Open profile" title="Profile">
          <img id="navProfileAvatar" src="assets/pfps/default.png" alt="Profile" />
        </a>
      </div>
    </nav>

    <section class="page-header profile-heading">
      <div>
        <h1 class="page-title">Your <span>Profile</span></h1>
        <p class="page-subtitle">Your anime identity, stats, and top-rated favorites.</p>
      </div>
    </section>

    <section class="profile-layout" id="profileRoot">
      <div class="loading">Loading profile…</div>
    </section>
    <footer class="mat-footer"></footer>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase-client.js?v=6.1.3"></script>
  <script src="js/network-errors.js"></script>
  <script src="js/profile-nav.js?v=6.1.3"></script>
  <script src="js/content-preferences.js"></script>
  <script src="js/badges.js"></script>
  <script src="js/franchises.js"></script>
  <script src="js/profile.js?v=6.1.3"></script>
  <script>
    requireSignedInUser().then((user) => {
      if (user) initProfile(user);
    });
  </script>
  <script src="js/version.js?v=6.1.3"></script>
  <script src="js/pwa.js"></script>
</body>
</html>
