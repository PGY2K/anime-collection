<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign In • My Anime Tracker</title>
  <meta name="theme-color" content="#8b5cf6" />
  <meta name="application-name" content="My Anime Tracker" />
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="icon" type="image/png" sizes="32x32" href="assets/icons/favicon-32.png" />
  <link rel="apple-touch-icon" href="assets/icons/apple-touch-icon.png" />
  <link rel="stylesheet" href="css/style.css?v=5.8.5" />
  <link rel="stylesheet" href="css/auth.css?v=5.7.4" />
</head>
<body>
  <main class="auth-page">
    <section class="auth-card">
      <a class="brand auth-brand brand-link" href="index.html" aria-label="My Anime Tracker"><img class="brand-logo" src="assets/icons/mat-logo.png" alt="" /><span>My Anime Tracker</span></a>
      <h1>Welcome Back</h1>
      <p>Sign in to track, rate, and discover anime.</p>

      <form id="loginForm">
        <label for="email">Email</label>
        <input class="search-box" id="email" type="email" autocomplete="email" required />

        <label for="password">Password</label>
        <input class="search-box" id="password" type="password" autocomplete="current-password" required />

        <button class="primary-btn auth-submit" type="submit">Sign In</button>
      </form>

      <div class="auth-message" id="authMessage"></div>

      <p class="auth-switch">
        Don't have an account?
        <a href="signup.html">Create Account</a>
      </p>
    </section>
    <footer class="mat-footer"></footer>
  </main>
  <div class="auth-confirm-modal hidden" id="suspendedAccountModal" role="dialog" aria-modal="true" aria-labelledby="suspendedAccountTitle">
    <section class="auth-confirm-card">
      <div class="auth-confirm-icon" aria-hidden="true">!</div>
      <h2 id="suspendedAccountTitle">Account Suspended</h2>
      <p>Your MAT account has been deleted. You can no longer access this account.</p>
      <div class="auth-confirm-actions auth-confirm-actions-single">
        <button class="primary-btn" id="suspendedAccountReturn" type="button">Return to Login</button>
      </div>
    </section>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase-client.js?v=5.7.4"></script>
  <script>
    const form = document.getElementById("loginForm");
    const message = document.getElementById("authMessage");
    const suspendedModal = document.getElementById("suspendedAccountModal");
    const suspendedReturnButton = document.getElementById("suspendedAccountReturn");

    function showSuspendedAccountModal() {
      suspendedModal.classList.remove("hidden");
      document.body.classList.add("auth-modal-open");
      suspendedReturnButton.focus();
    }

    function closeSuspendedAccountModal() {
      suspendedModal.classList.add("hidden");
      document.body.classList.remove("auth-modal-open");
      document.getElementById("email").focus();
    }

    async function rejectSuspendedLogin(userId) {
      const isSuspended = await getMatSuspensionStatus(userId);
      if (!isSuspended) return false;

      await endSuspendedMatSession({ redirectToLogin: false });
      sessionStorage.removeItem(MAT_SUSPENDED_SESSION_KEY);
      message.textContent = "";
      showSuspendedAccountModal();
      return true;
    }

    suspendedReturnButton.addEventListener("click", closeSuspendedAccountModal);

    (async function restoreLoginState() {
      const redirectedSuspendedUser = sessionStorage.getItem(MAT_SUSPENDED_SESSION_KEY) === "1";
      if (redirectedSuspendedUser) {
        sessionStorage.removeItem(MAT_SUSPENDED_SESSION_KEY);
        showSuspendedAccountModal();
      }

      const { data, error } = await supabaseClient.auth.getSession();
      if (error || !data?.session) return;

      if (await rejectSuspendedLogin(data.session.user.id)) return;
      window.location.href = "collection.html";
    })();

    form.addEventListener("submit", async (event) => {
      event.preventDefault();
      message.textContent = "Signing in...";
      message.className = "auth-message";

      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value;

      const { data, error } = await supabaseClient.auth.signInWithPassword({ email, password });

      if (error) {
        message.textContent = error.message;
        message.className = "auth-message auth-error";
        return;
      }

      if (await rejectSuspendedLogin(data?.user?.id)) return;
      window.location.href = "collection.html";
    });
  </script>
  <script src="js/version.js?v=5.8.5"></script>
  <script src="js/pwa.js"></script>
</body>
</html>
