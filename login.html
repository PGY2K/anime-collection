<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign In • My Anime Tracker</title>
  <meta name="theme-color" content="#8b5cf6" />
  <meta name="application-name" content="My Anime Tracker" />
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="icon" type="image/png" sizes="32x32" href="assets/icons/favicon-32.png" />
  <link rel="apple-touch-icon" href="assets/icons/apple-touch-icon.png" />
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/auth.css" />
</head>
<body>
  <main class="auth-page">
    <section class="auth-card">
      <a class="brand auth-brand brand-link" href="index.html" aria-label="My Anime Tracker"><img class="brand-logo" src="assets/icons/mat-logo.png" alt="" /><span>My Anime Tracker</span></a>
      <h1>Welcome Back</h1>
      <p>Sign in to track, rate, and discover anime.</p>

      <form id="loginForm">
        <label for="email">Email</label>
        <input class="search-box" id="email" type="email" autocomplete="email" required />

        <label for="password">Password</label>
        <input class="search-box" id="password" type="password" autocomplete="current-password" required />

        <button class="primary-btn auth-submit" type="submit">Sign In</button>
      </form>

      <div class="auth-message" id="authMessage"></div>

      <p class="auth-switch">
        Don't have an account?
        <a href="signup.html">Create Account</a>
      </p>
    </section>
    <footer class="mat-footer"></footer>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase-client.js"></script>
  <script>
    const form = document.getElementById("loginForm");
    const message = document.getElementById("authMessage");

    supabaseClient.auth.getSession().then(({ data }) => {
      if (data?.session) window.location.href = "collection.html";
    });

    form.addEventListener("submit", async (event) => {
      event.preventDefault();
      message.textContent = "Signing in...";
      message.className = "auth-message";

      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value;

      const { error } = await supabaseClient.auth.signInWithPassword({ email, password });

      if (error) {
        message.textContent = error.message;
        message.className = "auth-message auth-error";
        return;
      }

      window.location.href = "collection.html";
    });
  </script>
  <script src="js/version.js?v=4.4.0"></script>
  <script src="js/pwa.js"></script>
</body>
</html>
